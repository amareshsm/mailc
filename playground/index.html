<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>mailc — modern email compiler. Build emails that just work everywhere.</title>

    <link rel="canonical" href="https://mailc.dev/" />

    <meta property="og:site_name" content="mailc" />
    <meta property="og:url" content="https://mailc.dev/" />
    <meta property="og:title" content="mailc — modern email compiler" />

      property="og:description"
      content="Compile .mc markup into HTML that renders consistently across Gmail, Outlook, Apple Mail, and Yahoo. TypeScript-native, source-map-aware, plugin-friendly."

    <meta property="og:image" content="https://mailc.dev/og.png" />
    <meta property="og:image:alt" content="mailc — modern email compiler" />
    <meta property="og:image:width" content="1200" />

      content="TypeScript-native email compiler. Build, style, and ship emails that work everywhere."
